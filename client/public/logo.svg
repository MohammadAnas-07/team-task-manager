<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Define a reusable rounded rectangle shape -->
    <rect id="sq" width="220" height="220" rx="48" />
  </defs>
  
  <!-- Lower Frame (stroke only) -->
  <use href="#sq" x="240" y="240" fill="none" stroke="#1d1d1f" stroke-width="26" />
  
  <!-- Upper Frame (solid white fill for layering, then stroke) -->
  <use href="#sq" x="40" y="40" fill="#ffffff" />
  <use href="#sq" x="40" y="40" fill="none" stroke="#1d1d1f" stroke-width="26" />
  
</svg>
